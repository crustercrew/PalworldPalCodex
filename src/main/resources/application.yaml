spring:
  application:
    name: PalworldPalCodex

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:palworld_db}?sslmode=prefer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

    hikari:
      schema: ${DB_SCHEMA:palworld}

  jpa:
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: embedded

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: caffeine
    redis:
      time-to-live: 3600000

server:
    port: 8080

logging:
    level:
      org.hibernate.orm.core: ERROR
      org.hibernate.SQL: error
      org.springframework.web: warn