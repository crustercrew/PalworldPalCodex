version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: palworld-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: palworld_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d palworld_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: palworld-codex-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/palworld_db?sslmode=prefer
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgrespassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"

volumes:
  postgres_data: