version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: palworld-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: palworld_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d palworld_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: palworld-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: palworld-codex-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: palworld_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_SCHEMA: public

volumes:
  postgres_data: